name: Approve and Post to Forum

on:
  issue_comment:
    types: [created]

jobs:
  post-to-forum:
    # מופעל רק אם התגובה היא "כן" או "שחרר" והכותרת מתחילה ב-[אישור פרסום]
    if: |
      (github.event.comment.body == 'כן' || github.event.comment.body == 'שחרר') &&
      startsWith(github.event.issue.title, '[אישור פרסום]')
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Extract Version from Title
        id: extract_version
        run: |
          # הכותרת בפורמט: "[אישור פרסום] גרסה חדשה שוחררה: v1.0.59"
          TITLE="${{ github.event.issue.title }}"
          VERSION=$(echo "$TITLE" | grep -o 'v[0-9.]*')
          echo "Extracted Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Post to Forum
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: |
          python scripts/post_to_forum.py ${{ steps.extract_version.outputs.version }}

      - name: Close Issue on Success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "שותף בהצלחה בפורום! ✅"
          gh issue close ${{ github.event.issue.number }}
