name: Monitor External Release

on:
  schedule:
    - cron: '*/30 * * * *' # רץ כל חצי שעה לבדיקת רליסים
  workflow_dispatch: # מאפשר הפעלה ידנית לצורכי בדיקה

jobs:
  check-for-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Check for New Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # נדרש עבור ה-CLI ליצירת אישיוז
        run: python scripts/check_release.py

      - name: Commit State Change
        run: |
          git config --global user.name "Release Bot"
          git config --global user.email "release-bot@github.com"
          git add last_release.txt
          git commit -m "chore: update last processed release [skip ci]" || echo "No changes to commit"
          git push
