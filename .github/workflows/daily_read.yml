name: Daily Forum Reader Agent

on:
  schedule:
    - cron: '0 8 * * *' # רץ בכל יום ב-8 בבוקר
  workflow_dispatch: # מאפשר הפעלה ידנית מהאתר של GitHub

jobs:
  read-and-summarize:
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # מטמון אוטומטי לספריות פייתון

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # מתקין דפדפנים רק אם הם לא נמצאו בזיכרון המטמון
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != 'true' ]; then
            python -m playwright install --with-deps chromium
            python -m playwright install-deps
          fi

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_THREAD_URL: "https://mitmachim.top/topic/95538/%D7%A9%D7%99%D7%AA%D7%95%D7%A3-%D7%9E%D7%95%D7%91%D7%99%D7%93%D7%95%D7%A1-%D7%92%D7%A8%D7%A1%D7%AA-%D7%A0%D7%99%D7%A1%D7%99%D7%95%D7%9F-%D7%97%D7%99%D7%A0%D7%9D-%D7%A2%D7%93-%D7%A1%D7%95%D7%A3-%D7%91%D7%99%D7%9F-%D7%94%D7%96%D7%9E%D7%A0%D7%99%D7%9D/10"
        run: python scripts/read_agent.py

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f summary.txt ]; then
            # יצירת תוכן ה-Issue עם כותרת מקדימה
            echo "הנה מה שקרה בפורום לאחרונה:" > issue_body.txt
            echo "" >> issue_body.txt
            cat summary.txt >> issue_body.txt
            
            # יצירת ה-Issue דרך ה-CLI הרשמי
            gh issue create --title "דוח סוכן AI: עדכון מהפורום (מתמחים טופ)" --body-file issue_body.txt
          else
            echo "לא נמצא קובץ סיכום, מדלג על יצירת Issue."
          fi
